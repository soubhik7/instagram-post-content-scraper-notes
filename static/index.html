<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Content Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color-1: #0f172a;
        --bg-color-2: #1e1b4b;
        --bg-color-3: #312e81;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --success: #10b981;
        --error: #ef4444;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Outfit", sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-color-1),
          var(--bg-color-2),
          var(--bg-color-3)
        );
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        width: 90%;
        max-width: 500px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
        transform: translateY(0);
        transition: transform 0.3s ease;
      }

      .container:hover {
        transform: translateY(-5px);
      }

      h1 {
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 28px;
        background: -webkit-linear-gradient(45deg, #a855f7, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        color: var(--text-muted);
        margin-top: 0;
        margin-bottom: 32px;
        font-size: 15px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      input[type="url"] {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text-main);
        font-family: inherit;
        font-size: 16px;
        outline: none;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }

      input[type="url"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }

      input[type="url"]::placeholder {
        color: #64748b;
      }

      button {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: none;
        background: var(--primary);
        color: white;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        position: relative;
        overflow: hidden;
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.2),
          0 4px 6px -2px rgba(0, 0, 0, 0.1);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        background: #475569;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .result-box {
        margin-top: 24px;
        padding: 20px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--glass-border);
        display: none;
        text-align: left;
        animation: fadeIn 0.5s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-box.success {
        border-left: 4px solid var(--success);
      }

      .result-box.error {
        border-left: 4px solid var(--error);
      }

      .result-title {
        font-weight: 600;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .success .result-title {
        color: var(--success);
      }
      .error .result-title {
        color: var(--error);
      }

      .result-text {
        color: var(--text-muted);
        font-size: 14px;
        word-break: break-all;
        margin-bottom: 8px;
      }

      .result-text strong {
        color: var(--text-main);
        font-weight: 500;
      }

      /* Loading Spinner */
      .spinner {
        display: none;
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn-text {
        display: block;
      }

      button.loading .btn-text {
        display: none;
      }

      button.loading .spinner {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>TechNotes</h1>
      <p class="subtitle">Turn Instagram posts into clean, beautiful notes.</p>

      <form id="scrapeForm" class="form-group">
        <input
          type="url"
          id="urlInput"
          placeholder="https://www.instagram.com/p/..."
          required
        />
        <button type="submit" id="submitBtn">
          <span class="btn-text">Extract Content</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div id="resultBox" class="result-box">
        <div id="resultTitle" class="result-title"></div>
        <div id="resultMessage" class="result-text"></div>
        <div id="resultRaw" class="result-text" style="display: none"></div>
        <div id="resultDoc" class="result-text" style="display: none"></div>
        <div
          id="resultInfo"
          class="result-text"
          style="
            display: none;
            color: var(--text-muted);
            font-style: italic;
            font-size: 13px;
            margin-top: 12px;
          "
        ></div>
      </div>
    </div>

    <script>
      document
        .getElementById("scrapeForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const urlInput = document.getElementById("urlInput").value;
          const submitBtn = document.getElementById("submitBtn");
          const resultBox = document.getElementById("resultBox");
          const resultTitle = document.getElementById("resultTitle");
          const resultMessage = document.getElementById("resultMessage");
          const resultRaw = document.getElementById("resultRaw");
          const resultDoc = document.getElementById("resultDoc");
          const resultInfo = document.getElementById("resultInfo");

          // Set loading state
          submitBtn.classList.add("loading");
          submitBtn.disabled = true;
          resultBox.style.display = "none";
          resultRaw.style.display = "none";
          resultDoc.style.display = "none";
          resultInfo.style.display = "none";

          try {
            const response = await fetch("/extract", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ url: urlInput }),
            });

            const data = await response.json();

            resultBox.style.display = "block";
            resultBox.className = "result-box";

            if (response.ok) {
              resultBox.classList.add("success");
              resultTitle.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> ✅ Success`;
              resultMessage.textContent = data.message;

              if (data.raw_directory) {
                resultRaw.style.display = "block";
                resultRaw.innerHTML = `<strong>Raw Folder:</strong> ${data.raw_directory}`;
              }
              if (data.document_path) {
                resultDoc.style.display = "block";
                resultDoc.innerHTML = `<strong>Document:</strong> ${data.document_path}`;
              }
              if (data.raw_directory || data.document_path) {
                resultInfo.style.display = "block";
                resultInfo.textContent =
                  "📄 Your document is saved locally. Navigate to the folder above to open it.";
              }
            } else {
              resultBox.classList.add("error");
              resultTitle.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> Error`;
              resultMessage.textContent =
                data.detail || "An unexpected error occurred.";
            }
          } catch (error) {
            resultBox.style.display = "block";
            resultBox.className = "result-box error";
            resultTitle.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> Connection Error`;
            resultMessage.textContent = "Failed to connect to the server.";
          } finally {
            // Reset loading state
            submitBtn.classList.remove("loading");
            submitBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
